# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

title: Marie Kim Aviles
description: Bay is a minimal Jekyll Theme.
baseurl: "/bay"
url: "https://mariekimaviles.github.io"
og_image: /assets/img/profile-pic.jpg
google_analytics: "UA-121636368-3"

header:
  pages:
    - name: About
      slug: /
    - name: Research
    - name: Teaching
    - name: Personal

footer:
  show_powered_by: true
  contact:
    - type: email
      name: Email
      value: myk19 at georgetown dot edu
    # - type: wechat
    #   value: YourWeChatUsername
    #   link: "#"
  follow:
    # - type: twitter
    #   name: Twitter
    #   link: http://twitter.com/YourTwitterUsername
    #   username: "@YourTwitterUsername"
    # - type: facebook
    #   name: Facebook
    #   link: http://facebook.com/YourFacebookUsername
    - type: linkedin
      name: LinkedIn
      link: https://www.linkedin.com/in/marie-kim-a-4bb266213/
    - type: github
      name: GitHub
      link: http://github.com/mariekimaviles/
    # - type: dribbble
    #   name: Dribbble
    #   link: https://dribbble.com/YourDribbbleUsername
    # - type: rss
    #   name: RSS
    #   link: /feed.xml

# Build settings
markdown: kramdown
sass:
    style: :compressed
plugins:
  - jekyll-feed

# Excluded items
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - feed.xml
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Used for defeating caching
version: 1
